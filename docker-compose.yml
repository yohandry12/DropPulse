services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashdrop
      POSTGRES_PASSWORD: flashdrop
      POSTGRES_DB: flashdrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashdrop"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the bucket and make it public-read so product images are
  # served directly at http://localhost:9000/drops/<key>. Exits when done.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/drops &&
      mc anonymous set download local/drops
      "

  backend:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    environment:
      DATABASE_URL: "postgresql://flashdrop:flashdrop@db:5432/flashdrop?schema=public"
      PORT: 3000
      JWT_ACCESS_SECRET: "change-me-access"
      ACCESS_TOKEN_TTL: "15m"
      REFRESH_TOKEN_TTL_DAYS: 7
      HOLD_TTL_MINUTES: 10
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      S3_REGION: "us-east-1"
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: drops
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: ./backend
    command: node dist/worker.js
    environment:
      DATABASE_URL: "postgresql://flashdrop:flashdrop@db:5432/flashdrop?schema=public"
      HOLD_TTL_MINUTES: 10
      CRON_INTERVAL_SECONDS: 30
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
